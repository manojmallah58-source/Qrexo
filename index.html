<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Studio Pro - Create in Style</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body class="dark-mode">

    <!-- Background Decoration -->
    <div class="bg-blur"></div>
    <div class="bg-blur-2"></div>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <nav class="side-nav">
            <div class="brand">
                <div class="logo-box">
                    <i data-lucide="qr-code"></i>
                </div>
            </div>
            
            <div class="menu-items">
                <button class="menu-btn active" data-type="url" title="URL"><i data-lucide="link-2"></i><span>URL</span></button>
                <button class="menu-btn" data-type="wifi" title="WiFi"><i data-lucide="wifi"></i><span>WiFi</span></button>
                <button class="menu-btn" data-type="upi" title="Payment"><i data-lucide="indian-rupee"></i><span>UPI</span></button>
                <button class="menu-btn" data-type="vcard" title="Contact"><i data-lucide="user-circle"></i><span>vCard</span></button>
                <button class="menu-btn" data-type="text" title="Text"><i data-lucide="type"></i><span>Text</span></button>
                <button class="menu-btn" data-type="social" title="Social"><i data-lucide="share-2"></i><span>Social</span></button>
            </div>

            <button id="theme-toggle" class="theme-btn">
                <i data-lucide="moon"></i>
            </button>
        </nav>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1 id="page-title">Generate URL QR</h1>
                    <p>Customize every detail for a professional look.</p>
                </div>
                <div class="header-actions">
                    <button class="glass-btn" id="history-toggle"><i data-lucide="history"></i></button>
                </div>
            </header>

            <div class="grid-container">
                <!-- Editor Section -->
                <section class="editor-card">
                    <div id="dynamic-inputs" class="inputs-container">
                        <!-- Inputs will be injected here -->
                    </div>

                    <div class="customizer">
                        <div class="section-title">Design & Branding</div>
                        <div class="control-row">
                            <div class="control">
                                <label>QR Color</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="qr-color" value="#6366f1">
                                </div>
                            </div>
                            <div class="control">
                                <label>Background</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="bg-color" value="#ffffff">
                                </div>
                            </div>
                        </div>

                        <div class="control">
                            <label>Logo Placement</label>
                            <div class="upload-area" id="drop-zone">
                                <input type="file" id="logo-input" hidden accept="image/*">
                                <i data-lucide="image-plus"></i>
                                <span>Upload Logo</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Preview Section -->
                <section class="preview-card">
                    <div class="qr-output-container">
                        <div id="canvas-holder"></div>
                    </div>
                    
                    <div class="download-grid">
                        <button id="dl-png" class="primary-btn">
                            <i data-lucide="download"></i> Download PNG
                        </button>
                        <button id="dl-svg" class="secondary-btn">
                            <i data-lucide="file-code"></i> SVG
                        </button>
                        <button id="share-btn" class="secondary-btn">
                            <i data-lucide="external-link"></i>
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">QR Updated Successfully!</div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
