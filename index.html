<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Pro | Ultimate QR Code Generator</title>
    <meta name="description" content="Generate professional QR codes for WiFi, UPI, vCard, Social Media, and more. Free, offline, and secure.">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Styling Library -->
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon gradient-bg">
                    <i data-lucide="qr-code"></i>
                </div>
                <h1>QR<span>PRO</span></h1>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-type="url"><i data-lucide="link"></i> URL</button>
                <button class="nav-item" data-type="text"><i data-lucide="align-left"></i> Text</button>
                <button class="nav-item" data-type="wifi"><i data-lucide="wifi"></i> WiFi</button>
                <button class="nav-item" data-type="upi"><i data-lucide="credit-card"></i> UPI Payment</button>
                <button class="nav-item" data-type="vcard"><i data-lucide="contact"></i> vCard</button>
                <button class="nav-item" data-type="whatsapp"><i data-lucide="message-circle"></i> WhatsApp</button>
                <button class="nav-item" data-type="sms"><i data-lucide="message-square"></i> SMS</button>
                <button class="nav-item" data-type="email"><i data-lucide="mail"></i> Email</button>
                <button class="nav-item" data-type="tel"><i data-lucide="phone"></i> Phone</button>
                <button class="nav-item" data-type="location"><i data-lucide="map-pin"></i> Location</button>
            </nav>

            <div class="sidebar-footer">
                <button id="theme-toggle"><i data-lucide="sun"></i> <span>Light Mode</span></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="top-bar">
                <h2 id="current-title">URL QR Generator</h2>
                <div class="top-actions">
                    <button class="btn-icon" id="history-btn" title="History"><i data-lucide="history"></i></button>
                    <button class="btn-icon" id="fav-btn" title="Favorites"><i data-lucide="heart"></i></button>
                </div>
            </header>

            <div class="generator-grid">
                <!-- Input Panel -->
                <section class="panel input-panel">
                    <div id="dynamic-fields">
                        <!-- Fields injected by JS -->
                    </div>

                    <div class="customization-section">
                        <h3><i data-lucide="palette"></i> Design & Colors</h3>
                        <div class="control-group">
                            <label>QR Color</label>
                            <input type="color" id="qr-color" value="#ffffff">
                        </div>
                        <div class="control-group">
                            <label>Background</label>
                            <input type="color" id="bg-color" value="#00000000">
                        </div>
                        <div class="control-group">
                            <label>Size (px)</label>
                            <select id="qr-size">
                                <option value="300">300x300</option>
                                <option value="500" selected>500x500</option>
                                <option value="1000">1000x1000</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Logo (Optional)</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="logo-upload" accept="image/*">
                                <button class="btn-secondary">Upload Logo</button>
                            </div>
                            <button id="remove-logo" class="btn-link hidden">Remove Logo</button>
                        </div>
                    </div>
                </section>

                <!-- Preview Panel -->
                <section class="panel preview-panel">
                    <div id="canvas-wrapper">
                        <div id="qrcode"></div>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="download-png" class="btn-primary"><i data-lucide="download"></i> PNG</button>
                        <button id="download-svg" class="btn-secondary"><i data-lucide="file-type-2"></i> SVG</button>
                        <button id="copy-qr" class="btn-secondary"><i data-lucide="copy"></i> Copy</button>
                        <button id="print-qr" class="btn-secondary"><i data-lucide="printer"></i> Print</button>
                        <button id="share-qr" class="btn-secondary"><i data-lucide="share-2"></i> Share</button>
                    </div>
                </section>
            </div>
        </main>

        <!-- Modals -->
        <div id="history-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>History</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div id="history-list" class="list-container"></div>
                <button id="clear-history" class="btn-danger">Clear All</button>
            </div>
        </div>
    </div>

    <!-- Footer for Links -->
    <footer class="legal-footer">
        <a href="#" onclick="showPage('about')">About</a>
        <a href="#" onclick="showPage('privacy')">Privacy Policy</a>
        <a href="#" onclick="showPage('terms')">Terms</a>
        <a href="#" onclick="showPage('contact')">Contact</a>
    </footer>

    <script src="script.js"></script>
    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
