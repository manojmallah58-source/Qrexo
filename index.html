<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Studio Elite | Professional QR Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body class="dark-theme">

    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <div class="logo-circle"><i data-lucide="qr-code"></i></div>
                <span>QR Studio <span>Elite</span></span>
            </div>
            <div class="header-tools">
                <button id="theme-toggle" class="icon-btn"><i data-lucide="sun"></i></button>
                <button id="history-btn" class="icon-btn"><i data-lucide="history"></i></button>
            </div>
        </div>
    </header>

    <main class="app-main">
        <!-- Sidebar / Navigation -->
        <nav class="type-nav">
            <div class="nav-scroll">
                <button class="nav-pill active" data-type="url"><i data-lucide="link"></i> URL</button>
                <button class="nav-pill" data-type="wifi"><i data-lucide="wifi"></i> WiFi</button>
                <button class="nav-pill" data-type="upi"><i data-lucide="credit-card"></i> UPI</button>
                <button class="nav-pill" data-type="vcard"><i data-lucide="contact"></i> vCard</button>
                <button class="nav-pill" data-type="wa"><i data-lucide="message-circle"></i> WhatsApp</button>
                <button class="nav-pill" data-type="text"><i data-lucide="align-left"></i> Text</button>
                <button class="nav-pill" data-type="sms"><i data-lucide="mail"></i> SMS</button>
                <button class="nav-pill" data-type="tel"><i data-lucide="phone"></i> Call</button>
            </div>
        </nav>

        <div class="content-grid">
            <!-- Left: Inputs -->
            <section class="card editor-card">
                <div class="card-header">
                    <h3>QR Details</h3>
                    <p>Enter the information you want to encode</p>
                </div>
                <div id="fields-container" class="fields-area">
                    <!-- Fields injected here -->
                </div>

                <div class="design-section">
                    <h4><i data-lucide="palette"></i> Style & Branding</h4>
                    <div class="design-grid">
                        <div class="color-field">
                            <label>QR Color</label>
                            <input type="color" id="qr-color" value="#4f46e5">
                        </div>
                        <div class="color-field">
                            <label>Background</label>
                            <input type="color" id="bg-color" value="#ffffff">
                        </div>
                    </div>

                    <div class="logo-upload-box" id="logo-dropzone">
                        <input type="file" id="logo-file" hidden accept="image/*">
                        <div class="upload-content">
                            <i data-lucide="image-plus"></i>
                            <span>Add Brand Logo</span>
                        </div>
                        <img id="logo-preview" class="hidden">
                        <button id="remove-logo" class="remove-btn hidden">×</button>
                    </div>
                </div>
            </section>

            <!-- Right: Preview -->
            <section class="preview-sticky">
                <div class="card preview-card">
                    <div class="qr-frame">
                        <div id="qrcode-canvas"></div>
                    </div>
                    
                    <div class="actions-stack">
                        <button class="btn-primary" id="btn-png">
                            <i data-lucide="download"></i> Download PNG
                        </button>
                        <div class="btn-group">
                            <button class="btn-outline" id="btn-svg"><i data-lucide="file-type"></i> SVG</button>
                            <button class="btn-outline" id="btn-copy"><i data-lucide="copy"></i> Copy</button>
                            <button class="btn-outline" id="btn-share"><i data-lucide="share-2"></i></button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>© 2024 QR Studio Elite • Secure & Offline</p>
    </footer>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
