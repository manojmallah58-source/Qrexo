<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR Studio Pro | Enterprise Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons (Professional) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Premium QR Library -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body class="light-theme">

    <div class="app-container">
        <!-- Top Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="app-icon"><i data-lucide="qr-code"></i></div>
                <h1>QR Studio<span>Pro</span></h1>
            </div>
            <div class="header-btns">
                <button id="theme-toggle" class="circle-btn"><i data-lucide="moon"></i></button>
                <button id="history-toggle" class="circle-btn"><i data-lucide="history"></i></button>
            </div>
        </header>

        <!-- Main Content Scrollable -->
        <main class="app-content">
            <!-- QR Preview Card -->
            <section class="preview-card animate-in">
                <div id="qr-output" class="qr-canvas-wrapper"></div>
                <div class="quick-actions">
                    <button id="btn-png" class="main-download-btn">
                        <i data-lucide="download"></i> Save Image
                    </button>
                    <div class="secondary-actions">
                        <button id="btn-svg" title="Vector File"><i data-lucide="file-code"></i> SVG</button>
                        <button id="btn-share" title="Share"><i data-lucide="share-2"></i></button>
                    </div>
                </div>
            </section>

            <!-- Configuration Card -->
            <section class="editor-card animate-in-delay">
                <h2 id="generator-title">URL Generator</h2>
                <div id="fields-container" class="fields-grid">
                    <!-- JS Injected Fields -->
                </div>

                <div class="accordion">
                    <button class="accordion-trigger" onclick="toggleDesign()">
                        <span><i data-lucide="palette"></i> Style & Branding</span>
                        <i data-lucide="chevron-down" id="design-chevron"></i>
                    </button>
                    <div id="design-panel" class="design-content hidden">
                        <div class="control-row">
                            <div class="color-group">
                                <label>QR Color</label>
                                <input type="color" id="qr-color" value="#000000">
                            </div>
                            <div class="color-group">
                                <label>Background</label>
                                <input type="color" id="bg-color" value="#ffffff">
                            </div>
                        </div>
                        <div class="logo-upload-field">
                            <label>Center Logo</label>
                            <div class="upload-box" id="logo-btn">
                                <input type="file" id="logo-input" hidden accept="image/*">
                                <i data-lucide="plus"></i>
                                <span id="logo-label">Add Logo</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Tab Navigation (Mobile Friendly) -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-type="url"><i data-lucide="link"></i><span>URL</span></button>
            <button class="nav-item" data-type="wifi"><i data-lucide="wifi"></i><span>WiFi</span></button>
            <button class="nav-item" data-type="upi"><i data-lucide="credit-card"></i><span>UPI</span></button>
            <button class="nav-item" data-type="vcard"><i data-lucide="contact"></i><span>vCard</span></button>
            <button class="nav-item" data-type="text"><i data-lucide="align-left"></i><span>Text</span></button>
        </nav>
    </div>

    <!-- Modals -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>History</h3>
                <button onclick="closeHistory()">×</button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
